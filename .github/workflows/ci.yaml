name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install uv (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Invoke-WebRequest -Uri https://astral.sh/uv/install.ps1 -OutFile install.ps1
        ./install.ps1
        echo "$HOME\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        uv venv -p ${{ matrix.python-version }} --seed
        source .venv/bin/activate
        uv lock
        uv sync --all-extras

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        uv venv -p ${{ matrix.python-version }} --seed
        .venv\Scripts\Activate.ps1
        uv lock
        uv sync --all-extras

    - name: Set CI environment variable (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: echo "CI=true" >> $GITHUB_ENV

    - name: Set CI environment variable (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: echo "CI=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Run tests (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        source .venv/bin/activate
        python -m pytest tests/ -v -k "not download" --cov=anti_judol --cov-report=xml

    - name: Run tests (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        .venv\Scripts\Activate.ps1
        python -m pytest tests/ -v -k "not download" --cov=anti_judol --cov-report=xml

    - name: Upload coverage report
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
      continue-on-error: true
